name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset_arch: x86_64
          - target: aarch64-unknown-linux-musl
            asset_arch: aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build Web UI
        run: pnpm --dir web install --frozen-lockfile && pnpm --dir web build
      - name: Build static Rust binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: '--locked --release -p gaterust-server --all-features'
      - name: Assemble archive
        env:
          TARGET: ${{ matrix.target }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          test "$(sed -n 's/^version = "\([^"]*\)"/v\1/p' Cargo.toml | head -n 1)" = "$TAG"
          grep -Fqx "SCRIPT_VERSION=\"$TAG\"" scripts/gaterust.sh
          stage="dist/gaterust-$ASSET_ARCH-linux-musl"
          mkdir -p "$stage/config"
          install -m 0755 "target/$TARGET/release/gaterust-server" "$stage/gaterust-server"
          cp -a web/dist "$stage/web"
          install -m 0644 scripts/gaterust.service "$stage/gaterust.service"
          sed 's#../certs/server.pem#/etc/gaterust/tunnel/server.pem#; s#../certs/server-key.pem#/etc/gaterust/tunnel/server-key.pem#' config/server.example.toml > "$stage/config/server.example.toml"
          sed 's#../data/acme#/var/lib/gaterust/proxy/acme#' config/proxy.example.toml > "$stage/config/proxy.example.toml"
          sed 's#../web/dist#/usr/local/lib/gaterust/web#' config/web.example.toml > "$stage/config/web.example.toml"
          printf '%s\n' "$TAG" > "$stage/VERSION"
          printf '%s\n' "$TARGET" > "$stage/TARGET"
          tar -C "$stage" -czf "$GITHUB_WORKSPACE/dist/gaterust-$ASSET_ARCH-linux-musl.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: gaterust-${{ matrix.asset_arch }}
          path: dist/gaterust-${{ matrix.asset_arch }}-linux-musl.tar.gz
          if-no-files-found: error

  client:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_arch: x86_64
            asset_os: linux-musl
            electron_arch: x64
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_arch: aarch64
            asset_os: linux-musl
            electron_arch: arm64
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_arch: x86_64
            asset_os: windows
            electron_arch: x64
          - runner: macos-latest
            target: x86_64-apple-darwin
            asset_arch: x86_64
            asset_os: macos
            electron_arch: x64
          - runner: macos-latest
            target: aarch64-apple-darwin
            asset_arch: aarch64
            asset_os: macos
            electron_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.target }}
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Verify client versions
        env:
          TAG: ${{ github.ref_name }}
        run: node -e "const fs=require('node:fs');const cargo=fs.readFileSync('Cargo.toml','utf8').match(/version = \"([^\"]+)\"/)[1];const desktop=require('./client/package.json').version;if ('v'+cargo!==process.env.TAG || desktop!==cargo) throw new Error('client versions do not match release tag')"
      - name: Build static Linux client
        if: runner.os == 'Linux'
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: '--locked --release -p gaterust-client'
      - name: Build client
        if: runner.os != 'Linux'
        run: cargo build --locked --release -p gaterust-client --target ${{ matrix.target }}
      - name: Stage Unix backend
        if: runner.os != 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -eu
          mkdir -p client/resources/bin
          install -m 0755 "target/$TARGET/release/gaterust-client" client/resources/bin/gaterust-client
      - name: Stage Windows backend
        if: runner.os == 'Windows'
        env:
          TARGET: ${{ matrix.target }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path client/resources/bin | Out-Null
          Copy-Item "target/$env:TARGET/release/gaterust-client.exe" client/resources/bin/gaterust-client.exe
      - name: Build desktop UI
        run: pnpm --dir client install --frozen-lockfile && pnpm --dir client build
      - name: Package Linux desktop client
        if: runner.os == 'Linux'
        run: pnpm --dir client exec electron-builder --linux AppImage --${{ matrix.electron_arch }} --publish never
      - name: Package macOS desktop client
        if: runner.os == 'macOS'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm --dir client exec electron-builder --mac dmg --${{ matrix.electron_arch }} --publish never
      - name: Package Windows desktop client
        if: runner.os == 'Windows'
        run: pnpm --dir client exec electron-builder --win nsis --${{ matrix.electron_arch }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: gaterust-client-${{ matrix.asset_arch }}-${{ matrix.asset_os }}
          path: client/release/gaterust-client-*
          if-no-files-found: error

  release:
    needs: [server, client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: gaterust-*
          path: dist
          merge-multiple: true
      - name: Prepare release assets
        run: |
          install -m 0755 scripts/gaterust.sh dist/gaterust.sh
          install -m 0644 config/client.example.toml dist/client.example.toml
          cd dist
          sha256sum gaterust-client-* gaterust-*-linux-musl.tar.gz gaterust.sh client.example.toml > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/gaterust-*-linux-musl.tar.gz
            dist/gaterust-client-*
            dist/SHA256SUMS
            dist/gaterust.sh
            dist/client.example.toml
