name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset_arch: x86_64
          - target: aarch64-unknown-linux-musl
            asset_arch: aarch64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.15.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build Web UI
        run: pnpm --dir web install --frozen-lockfile && pnpm --dir web build
      - name: Build static Rust binary
        uses: houseabsolute/actions-rust-cross@21b0f18dc621b25bfae556ff2791fca4173121e8 # v1.0.8
        with:
          command: build
          target: ${{ matrix.target }}
          args: '--locked --release -p gaterust-server --all-features'
      - name: Assemble archive
        env:
          TARGET: ${{ matrix.target }}
          ASSET_ARCH: ${{ matrix.asset_arch }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          test "$(sed -n 's/^version = "\([^"]*\)"/v\1/p' Cargo.toml | head -n 1)" = "$TAG"
          grep -Fqx "SCRIPT_VERSION=\"$TAG\"" scripts/gaterust.sh
          stage="dist/gaterust-$ASSET_ARCH-linux-musl"
          mkdir -p "$stage/config"
          install -m 0755 "target/$TARGET/release/gaterust-server" "$stage/gaterust-server"
          cp -a web/dist "$stage/web"
          install -m 0644 scripts/gaterust.service "$stage/gaterust.service"
          sed 's#../certs/server.pem#/etc/gaterust/tunnel/server.pem#; s#../certs/server-key.pem#/etc/gaterust/tunnel/server-key.pem#' config/server.example.toml > "$stage/config/server.example.toml"
          sed 's#../data/acme#/var/lib/gaterust/proxy/acme#' config/proxy.example.toml > "$stage/config/proxy.example.toml"
          sed 's#../web/dist#/usr/local/lib/gaterust/web#' config/web.example.toml > "$stage/config/web.example.toml"
          printf '%s\n' "$TAG" > "$stage/VERSION"
          printf '%s\n' "$TARGET" > "$stage/TARGET"
          tar -C "$stage" -czf "$GITHUB_WORKSPACE/dist/gaterust-$ASSET_ARCH-linux-musl.tar.gz" .
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gaterust-${{ matrix.asset_arch }}
          path: dist/gaterust-${{ matrix.asset_arch }}-linux-musl.tar.gz
          if-no-files-found: error

  client:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset_arch: x86_64
            asset_os: linux
            bundle: appimage
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_arch: aarch64
            asset_os: linux
            bundle: appimage
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_arch: x86_64
            asset_os: windows
            bundle: nsis
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset_arch: x86_64
            asset_os: macos
            bundle: dmg
          - runner: macos-15
            target: aarch64-apple-darwin
            asset_arch: aarch64
            asset_os: macos
            bundle: dmg
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.target }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.15.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Verify client versions
        env:
          TAG: ${{ github.ref_name }}
        run: node -e "const fs=require('node:fs');const cargo=fs.readFileSync('Cargo.toml','utf8').match(/version = \"([^\"]+)\"/)[1];const desktop=require('./client/package.json').version;if ('v'+cargo!==process.env.TAG || desktop!==cargo) throw new Error('client versions do not match release tag')"
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Install desktop dependencies
        run: pnpm --dir client install --frozen-lockfile
      - name: Build desktop client
        run: pnpm --dir client exec tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundle }} -- --locked
      - name: Stage Linux package
        if: runner.os == 'Linux'
        shell: bash
        env:
          ASSET_ARCH: ${{ matrix.asset_arch }}
          TARGET: ${{ matrix.target }}
        run: |
          set -eu
          mkdir -p client/release
          install -m 0755 target/$TARGET/release/bundle/appimage/*.AppImage "client/release/gaterust-client-$ASSET_ARCH-linux.AppImage"
      - name: Stage macOS package
        if: runner.os == 'macOS'
        shell: bash
        env:
          ASSET_ARCH: ${{ matrix.asset_arch }}
          TARGET: ${{ matrix.target }}
        run: |
          set -eu
          mkdir -p client/release
          cp target/$TARGET/release/bundle/dmg/*.dmg "client/release/gaterust-client-$ASSET_ARCH-macos.dmg"
      - name: Stage Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ASSET_ARCH: ${{ matrix.asset_arch }}
          TARGET: ${{ matrix.target }}
        run: |
          New-Item -ItemType Directory -Force -Path client/release | Out-Null
          Copy-Item "target/$env:TARGET/release/bundle/nsis/*-setup.exe" "client/release/gaterust-client-$env:ASSET_ARCH-windows.exe"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gaterust-client-${{ matrix.asset_arch }}-${{ matrix.asset_os }}
          path: client/release/gaterust-client-*
          if-no-files-found: error

  release:
    needs: [server, client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: gaterust-*
          path: dist
          merge-multiple: true
      - name: Prepare release assets
        run: |
          install -m 0755 scripts/gaterust.sh dist/gaterust.sh
          install -m 0644 config/client.example.toml dist/client.example.toml
          cd dist
          sha256sum gaterust-client-* gaterust-*-linux-musl.tar.gz gaterust.sh client.example.toml > SHA256SUMS
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/gaterust-*-linux-musl.tar.gz
            dist/gaterust-client-*
            dist/SHA256SUMS
            dist/gaterust.sh
            dist/client.example.toml
