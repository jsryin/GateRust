<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#15201f" />
    <title>GateRust Client</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">G</span>
        <div><strong>GateRust</strong><small>Client</small></div>
      </div>
      <div class="connection" aria-live="polite">
        <i id="status-dot"></i>
        <div><strong id="status-label">正在启动</strong><small id="status-detail"></small></div>
      </div>
      <button id="shutdown" class="quiet danger" type="button">退出客户端</button>
    </header>

    <main>
      <div class="page-heading">
        <div><p>CLIENT SETTINGS</p><h1>客户端配置</h1></div>
        <button id="save-top" class="primary" type="submit" form="config-form">保存配置</button>
      </div>

      <div id="notice" class="notice" role="status" hidden></div>

      <form id="config-form">
        <section>
          <div class="section-heading"><h2>连接设置</h2><span>QUIC / TLS</span></div>
          <div class="form-grid two">
            <label>服务器地址<input id="server-address" required placeholder="tunnel.example.com:2333" /></label>
            <label>TLS 服务器名称<input id="server-name" placeholder="tunnel.example.com" /></label>
            <label class="span-two">CA 证书路径<input id="ca-certificate" placeholder="留空时使用系统受信 CA" /></label>
            <label class="span-two">分组密钥
              <span class="input-action">
                <input id="group-key" type="password" required autocomplete="off" minlength="32" maxlength="124" />
                <button id="toggle-key" class="quiet" type="button">显示</button>
                <button id="generate-key" class="quiet" type="button">生成</button>
              </span>
            </label>
          </div>
        </section>

        <section>
          <div class="section-heading">
            <div><h2>本地服务</h2><span id="service-count">0 项</span></div>
            <button id="add-service" class="secondary" type="button">添加服务</button>
          </div>
          <div class="service-head" aria-hidden="true"><span>名称</span><span>协议</span><span>目标地址</span><span></span></div>
          <div id="services" class="service-list"></div>
          <div id="empty-services" class="empty">尚未添加本地服务</div>
        </section>

        <div class="form-actions">
          <span id="config-path"></span>
          <button id="save-bottom" class="primary" type="submit">保存配置</button>
        </div>
      </form>
    </main>

    <template id="service-template">
      <div class="service-row">
        <label><span class="mobile-label">名称</span><input class="service-name" required maxlength="64" placeholder="ssh" /></label>
        <label><span class="mobile-label">协议</span><select class="service-kind"><option value="tcp">TCP</option><option value="udp">UDP</option><option value="socks5">SOCKS5</option></select></label>
        <label class="target-field"><span class="mobile-label">目标地址</span><input class="service-target" required placeholder="127.0.0.1:22" /></label>
        <button class="remove-service danger" type="button" aria-label="删除服务">删除</button>
      </div>
    </template>
    <script src="/app.js" defer></script>
  </body>
</html>
