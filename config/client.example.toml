key = "replace-with-the-same-32-to-124-character-key"

[server]
address = "tunnel.example.com:2333"
name = "tunnel.example.com"
ca_certificate = "../certs/ca.pem"

[[services]]
name = "ssh"
kind = "tcp"
target = "127.0.0.1:22"

[[services]]
name = "game-udp"
kind = "udp"
target = "127.0.0.1:27015"

[[services]]
name = "private-socks"
kind = "socks5"
